<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the root service may own the well-known name. -->
  <policy user="root">
    <allow own="io.github.keyboardspecialist.BC250Control1"/>
  </policy>
  <policy context="default">
    <!-- The service resolves the sender and authorizes mutations with polkit. -->
    <allow send_destination="io.github.keyboardspecialist.BC250Control1"/>
  </policy>
</busconfig>
