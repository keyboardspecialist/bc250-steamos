        <rect y="529" width="648" height="177" rx="10" fill="#1a2533" stroke="#2d3b4e"/>
        <rect x="18" y="551" width="612" height="38" rx="7" fill="#26364b" stroke="#41516a"/><text x="324" y="575" class="btn" text-anchor="middle">Apply profile now</text>
        <rect x="18" y="600" width="612" height="38" rx="7" fill="#2c6cdf"/><text x="324" y="624" class="btn" text-anchor="middle">Enable profile at boot</text>
        <rect x="18" y="649" width="612" height="38" rx="7" fill="#4a2e35" stroke="#72444e"/><text x="324" y="673" class="btn" text-anchor="middle">Revert to stock</text>
