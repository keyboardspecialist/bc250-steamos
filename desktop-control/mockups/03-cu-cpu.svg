          <g transform="translate(202 384)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
          <g transform="translate(292 384)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
          <g transform="translate(382 384)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
          <g transform="translate(472 384)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
