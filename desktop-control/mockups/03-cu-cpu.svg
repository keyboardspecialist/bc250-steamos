<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
  <defs>
    <linearGradient id="b3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07101a"/><stop offset="1" stop-color="#172534"/></linearGradient>
    <linearGradient id="h3" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#202d3d"/><stop offset="1" stop-color="#172332"/></linearGradient>
    <filter id="s3" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dy="14" stdDeviation="15" flood-opacity=".4"/></filter>
    <style>
      .u{font-family:Inter,"Noto Sans",sans-serif;fill:#e9eef5}.t{font-size:21px;font-weight:700}.sub{font-size:11px;fill:#91a0b2}
      .tab{font-size:12px;font-weight:600}.sect{font-size:13px;font-weight:650;fill:#d8e0ea}.lab{font-size:12px;fill:#a3b0bf}.val{font-size:12px;fill:#edf2f7;font-weight:550}
