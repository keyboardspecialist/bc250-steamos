        <text x="18" y="291" class="mini">VID SAFETY LIMIT</text>
        <rect x="18" y="301" width="612" height="38" rx="7" fill="#111b27" stroke="#3d4b60"/><text x="324" y="326" class="ctl" text-anchor="middle">1275 mV</text><text x="36" y="326" fill="#7f8d9f">-</text><text x="613" y="326" fill="#7f8d9f">+</text>
        <text x="18" y="364" class="mini">TEMPERATURE LIMIT</text>
