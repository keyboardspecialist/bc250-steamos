          <g transform="translate(202 334)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
          <g transform="translate(292 334)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
          <g transform="translate(382 334)"><rect width="80" height="34" rx="6" fill="#316ee8"/><text x="40" y="22">ON</text></g>
