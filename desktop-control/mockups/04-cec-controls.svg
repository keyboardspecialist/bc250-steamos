<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="820" viewBox="0 0 1120 820">
  <defs>
    <linearGradient id="b4" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111c"/><stop offset="1" stop-color="#172433"/></linearGradient>
    <linearGradient id="h4" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#202d3d"/><stop offset="1" stop-color="#172332"/></linearGradient>
    <filter id="s4" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dy="16" stdDeviation="18" flood-opacity=".42"/></filter>
    <style>
      .u{font-family:Inter,"Noto Sans",sans-serif;fill:#e9eef5}.ttl{font-size:24px;font-weight:700}.sub{font-size:12px;fill:#91a0b2}.nav{font-size:13px;font-weight:600}
      .sect{font-size:13px;font-weight:650;fill:#d8e0ea}.lab{font-size:12px;fill:#a3b0bf}.val{font-size:12px;fill:#edf2f7;font-weight:550}.ctl{font-size:12px;fill:#e9eef5}.mini{font-size:10px;fill:#8f9daf}.btn{font-size:12px;font-weight:650;fill:#fff}
    </style>
  </defs>
  <rect width="1120" height="820" fill="url(#b4)"/>
  <g filter="url(#s4)">
    <rect x="54" y="42" width="1012" height="736" rx="15" fill="#101925" stroke="#344256"/>
    <rect x="54" y="42" width="1012" height="82" rx="15" fill="url(#h4)"/><rect x="54" y="105" width="1012" height="19" fill="url(#h4)"/>
    <g class="u">
