          <g transform="translate(18 281)"><rect width="231" height="48" rx="7" fill="#316ee8"/><text x="115" y="29">Wake TV and select input</text></g>
          <g transform="translate(261 281)"><rect width="231" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="115" y="29">TV standby</text></g>
          <g transform="translate(18 341)"><rect width="231" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="115" y="29">Receiver on</text></g>
          <g transform="translate(261 341)"><rect width="231" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="115" y="29">Receiver standby</text></g>
          <g transform="translate(18 401)"><rect width="231" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="115" y="29">Claim active source</text></g>
          <g transform="translate(261 401)"><rect width="231" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="115" y="29">Release active source</text></g>
        </g>

        <text x="536" y="246" class="sect">Behavior</text>
        <rect x="536" y="259" width="262" height="244" rx="10" fill="#1a2533" stroke="#2d3b4e"/>
        <g class="ctl">
          <rect x="556" y="284" width="38" height="20" rx="10" fill="#316ee8"/><circle cx="583" cy="294" r="8" fill="#fff"/><text x="606" y="298">Wake TV on resume</text>
          <line x1="556" y1="319" x2="778" y2="319" stroke="#2b394b"/>
          <rect x="556" y="339" width="38" height="20" rx="10" fill="#316ee8"/><circle cx="583" cy="349" r="8" fill="#fff"/><text x="606" y="353">TV standby on suspend</text>
          <line x1="556" y1="374" x2="778" y2="374" stroke="#2b394b"/>
          <rect x="556" y="394" width="38" height="20" rx="10" fill="#3a4657"/><circle cx="567" cy="404" r="8" fill="#c5cfdb"/><text x="606" y="408">Suspend when TV turns off</text>
          <line x1="556" y1="429" x2="778" y2="429" stroke="#2b394b"/>
          <rect x="556" y="449" width="38" height="20" rx="10" fill="#316ee8"/><circle cx="583" cy="459" r="8" fill="#fff"/><text x="606" y="463">TV remote input</text>
        </g>

        <text y="538" class="sect">Volume</text>
        <rect y="551" width="798" height="100" rx="10" fill="#1a2533" stroke="#2d3b4e"/>
        <g class="btn" text-anchor="middle">
          <g transform="translate(18 577)"><rect width="244" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="122" y="29">Volume up</text></g>
          <g transform="translate(277 577)"><rect width="244" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="122" y="29">Volume down</text></g>
          <g transform="translate(536 577)"><rect width="244" height="48" rx="7" fill="#26364b" stroke="#41516a"/><text x="122" y="29">Mute</text></g>
        </g>
