      <rect x="54" y="124" width="162" height="654" fill="#151f2c"/>
      <g class="nav"><text x="86" y="169" fill="#a3b0bf">Overview</text><text x="86" y="216" fill="#a3b0bf">GPU</text><text x="86" y="263" fill="#a3b0bf">CU</text><text x="86" y="310" fill="#a3b0bf">CPU</text>
        <rect x="66" y="329" width="138" height="42" rx="8" fill="#316ee8"/>
        <path d="M81 347h14v10H81zM85 357v5h6v-5" fill="none" stroke="#fff" stroke-width="1.5"/><text x="106" y="355" fill="#fff">CEC</text>
      </g>

      <g transform="translate(242 151)">
        <text class="sect">CEC Status</text>
        <rect y="13" width="798" height="198" rx="10" fill="#1a2533" stroke="#2d3b4e"/>
        <text x="18" y="43" class="lab">Daemon</text><text x="762" y="43" text-anchor="end" class="val">active</text><circle cx="780" cy="39" r="5" fill="#42c98b"/>
        <line x1="18" y1="56" x2="780" y2="56" stroke="#2b394b"/>
        <text x="18" y="82" class="lab">Active source</text><text x="762" y="82" text-anchor="end" class="val">This console</text><circle cx="780" cy="78" r="5" fill="#42c98b"/>
        <line x1="18" y1="95" x2="780" y2="95" stroke="#2b394b"/>
        <text x="18" y="121" class="lab">Poweroff integration</text><text x="762" y="121" text-anchor="end" class="val">Installed</text><circle cx="780" cy="117" r="5" fill="#42c98b"/>
        <line x1="18" y1="134" x2="780" y2="134" stroke="#2b394b"/>
        <text x="18" y="160" class="lab">Sleep integration</text><text x="762" y="160" text-anchor="end" class="val">Installed</text><circle cx="780" cy="156" r="5" fill="#42c98b"/>
        <rect x="18" y="172" width="664" height="30" rx="6" fill="#111b27" stroke="#3d4b60"/><text x="32" y="192" class="ctl">BC250</text>
        <rect x="694" y="172" width="86" height="30" rx="6" fill="#26364b" stroke="#41516a"/><text x="737" y="192" class="btn" text-anchor="middle">Save</text>

        <text y="246" class="sect">TV and Receiver</text>
        <rect y="259" width="510" height="244" rx="10" fill="#1a2533" stroke="#2d3b4e"/>
