<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="game" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#17324b"/><stop offset=".5" stop-color="#0b1723"/><stop offset="1" stop-color="#28374b"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#202a35"/><stop offset="1" stop-color="#151b22"/></linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#4c98ff" stop-opacity=".7"/><stop offset="1" stop-color="#6b3dd1" stop-opacity=".15"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="shadow"><feDropShadow dx="-14" dy="0" stdDeviation="18" flood-opacity=".5"/></filter>
    <style>
      .u{font-family:Inter,"Noto Sans",sans-serif;fill:#f5f7fa}.title{font-size:22px;font-weight:700}.small{font-size:11px;fill:#aeb3b8}.tab{font-size:13px;font-weight:650}.sect{font-size:13px;font-weight:650;fill:#dce2e8}.lab{font-size:12px;fill:#adb5bd}.val{font-size:12px;fill:#fff;font-weight:600}.chart{font-size:11px;fill:#b8bfc6}.metric{font-size:15px;fill:#fff;font-weight:700}.btn{font-size:13px;fill:#fff;font-weight:650}
    </style>
  </defs>
  <rect width="1280" height="800" fill="url(#game)"/>
  <g opacity=".78">
    <circle cx="270" cy="280" r="180" fill="#357bbd" opacity=".3" filter="url(#blur)"/>
    <circle cx="635" cy="450" r="240" fill="#8f4de1" opacity=".16" filter="url(#blur)"/>
    <path d="M0 620C190 490 310 700 475 565S760 525 864 410V800H0Z" fill="#08101a" opacity=".72"/>
    <rect x="92" y="92" width="590" height="298" rx="24" fill="#fff" opacity=".025" stroke="#d9efff" stroke-opacity=".1"/>
    <text x="112" y="132" class="u" font-size="13" opacity=".55">GAME RUNNING</text>
    <text x="112" y="188" class="u" font-size="36" font-weight="700" opacity=".6">SteamOS Gaming Mode</text>
    <text x="112" y="226" class="u" font-size="15" opacity=".42">Quick Access remains available over any game.</text>
  </g>
  <g class="u"><text x="34" y="45" font-size="13">12:42 PM</text><text x="802" y="45" font-size="12" text-anchor="end">Wi-Fi  |  87%</text></g>

  <g transform="translate(850)" filter="url(#shadow)">
    <rect width="430" height="800" fill="url(#panel)"/>
    <rect width="430" height="72" fill="#29343f"/>
    <g class="u"><circle cx="34" cy="36" r="14" fill="#4094ff" opacity=".25"/><path d="M27 37h14M30 31h8M33 26h2" stroke="#bcd9ff" stroke-width="2" stroke-linecap="round"/><text x="58" y="43" class="title">BC-250 Control</text><text x="398" y="42" font-size="20" text-anchor="end">...</text></g>

    <g class="u">
      <rect x="14" y="88" width="194" height="40" rx="7" fill="#4094ff" opacity=".32" stroke="#65adff"/>
      <text x="111" y="113" class="tab" text-anchor="middle">Summary</text>
      <rect x="220" y="88" width="194" height="40" rx="7" fill="#fff" opacity=".05"/>
      <text x="317" y="113" class="tab" text-anchor="middle" fill="#aeb3b8">CEC</text>

      <rect x="14" y="145" width="400" height="48" rx="7" fill="#2d3946" stroke="#435465"/>
      <text x="214" y="175" class="btn" text-anchor="middle">Open full controls</text>

      <text x="18" y="224" class="sect">System summary</text>
      <g transform="translate(14 238)">
        <rect width="400" height="150" rx="8" fill="#fff" opacity=".035" stroke="#fff" stroke-opacity=".08"/>
        <text x="14" y="28" class="lab">Compute units</text><text x="370" y="28" text-anchor="end" class="val">38 / 40</text><circle cx="386" cy="24" r="4" fill="#59d185"/>
        <line x1="14" y1="42" x2="386" y2="42" stroke="#fff" stroke-opacity=".08"/>
        <text x="14" y="65" class="lab">CPU OC profile</text><text x="386" y="65" text-anchor="end" class="val">Enabled at boot</text>
        <line x1="14" y1="79" x2="386" y2="79" stroke="#fff" stroke-opacity=".08"/>
        <text x="14" y="102" class="lab">GPU governor</text><text x="370" y="102" text-anchor="end" class="val">Active - D-Bus ready</text><circle cx="386" cy="98" r="4" fill="#59d185"/>
        <line x1="14" y1="116" x2="386" y2="116" stroke="#fff" stroke-opacity=".08"/>
        <text x="14" y="139" class="lab">CEC</text><text x="370" y="139" text-anchor="end" class="val">active</text><circle cx="386" cy="135" r="4" fill="#59d185"/>
      </g>

      <g transform="translate(14 404)">
        <rect width="194" height="92" rx="8" fill="#fff" opacity=".04" stroke="#fff" stroke-opacity=".09"/>
        <text x="12" y="22" class="chart">CPU clock</text><text x="180" y="22" class="metric" text-anchor="end">3487 MHz</text>
        <path d="M12 67L32 65L52 69L72 55L92 59L112 47L132 51L152 38L180 43" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
        <line x1="12" y1="73" x2="180" y2="73" stroke="#fff" stroke-opacity=".11"/>
        <text x="12" y="87" class="small">3200 min</text><text x="180" y="87" class="small" text-anchor="end">3500 max</text>
      </g>
      <g transform="translate(220 404)">
        <rect width="194" height="92" rx="8" fill="#fff" opacity=".04" stroke="#fff" stroke-opacity=".09"/>
        <text x="12" y="22" class="chart">GPU clock</text><text x="180" y="22" class="metric" text-anchor="end">1500 MHz</text>
        <path d="M12 68L32 68L52 60L72 62L92 48L112 53L132 35L152 41L180 29" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
        <line x1="12" y1="73" x2="180" y2="73" stroke="#fff" stroke-opacity=".11"/>
        <text x="12" y="87" class="small">600 min</text><text x="180" y="87" class="small" text-anchor="end">1500 max</text>
      </g>
      <g transform="translate(14 508)">
        <rect width="194" height="92" rx="8" fill="#fff" opacity=".04" stroke="#fff" stroke-opacity=".09"/>
        <text x="12" y="22" class="chart">CPU temperature</text><text x="180" y="22" class="metric" text-anchor="end">54 C</text>
        <path d="M12 67L32 62L52 64L72 58L92 60L112 54L132 56L152 48L180 51" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
        <text x="12" y="87" class="small">48 min</text><text x="180" y="87" class="small" text-anchor="end">55 max</text>
      </g>
      <g transform="translate(220 508)">
        <rect width="194" height="92" rx="8" fill="#fff" opacity=".04" stroke="#fff" stroke-opacity=".09"/>
        <text x="12" y="22" class="chart">GPU temperature</text><text x="180" y="22" class="metric" text-anchor="end">58 C</text>
        <path d="M12 67L32 64L52 58L72 61L92 53L112 56L132 46L152 48L180 42" fill="none" stroke="#fb923c" stroke-width="3" stroke-linecap="round"/>
        <text x="12" y="87" class="small">51 min</text><text x="180" y="87" class="small" text-anchor="end">59 max</text>
      </g>

      <rect x="14" y="632" width="400" height="48" rx="7" fill="#2d3946" stroke="#435465"/>
      <path d="M164 650a9 9 0 1 1 3 7M164 646v5h5" fill="none" stroke="#dce5ee" stroke-width="1.8"/>
      <text x="224" y="662" class="btn" text-anchor="middle">Refresh status</text>
      <text x="214" y="724" class="small" text-anchor="middle">Live telemetry samples every second</text>
    </g>
  </g>
</svg>
